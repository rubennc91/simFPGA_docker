services:
  simulador:
    image: fpga_sim_image
    container_name: fpga_sim_container
    network_mode: host
    privileged: true
    devices:
      - /dev/dri:/dev/dri
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/root/simFPGA_docker
    stdin_open: true 
    tty: true        
    command: bash -c "source /opt/ros/noetic/setup.bash && roscore"
